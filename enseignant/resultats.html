<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Résultats de la classe — Espace Enseignant</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="bandeau-hors-ligne" class="bandeau-hors-ligne">Vous êtes hors connexion.</div>
  <div class="app-topbar">
    <div class="app-nav__marque">🎓 Enseignant</div>
    <div id="app-topbar-liens" class="app-topbar__liens"></div>
  </div>
  <div class="app-layout">
    <nav class="app-nav" id="app-nav"></nav>
    <main class="app-main">
      <div class="entete-page">
        <h1 id="titre">Résultats de la classe</h1>
      </div>
      <div id="tableau-resultats"><p class="texte-att">Chargement…</p></div>
    </main>
  </div>

  <script type="module">
    import { exigerRole } from "/js/auth.js";
    import { initLayout, echapperHtml, parametreUrl } from "/js/ui.js";
    import { supabase } from "/js/supabase-client.js";

    const classeId = parametreUrl("classe");
    const contexte = await exigerRole("enseignant");
    if (contexte && classeId) {
      initLayout({ role: "enseignant", actif: "classes", profile: contexte.profile });

      const { data: classe } = await supabase.from("classes").select("nom").eq("id", classeId).single();
      document.getElementById("titre").textContent = `Résultats — ${classe?.nom || ""}`;

      const { data: inscriptions } = await supabase
        .from("classe_eleves").select("eleve_id, profiles(prenom)").eq("classe_id", classeId);
      const eleves = inscriptions || [];
      const eleveIds = eleves.map(i => i.eleve_id);

      const conteneur = document.getElementById("tableau-resultats");
      if (eleveIds.length === 0) {
        conteneur.innerHTML = `<div class="vide">Aucun élève dans cette classe.</div>`;
      } else {
        const [{ data: tentatives }, { data: progres }] = await Promise.all([
          supabase.from("tentatives").select("eleve_id, score, score_max").in("eleve_id", eleveIds),
          supabase.from("progres_lecons").select("eleve_id, statut").in("eleve_id", eleveIds).eq("statut", "termine"),
        ]);

        const lignes = eleves.map(({ eleve_id, profiles }) => {
          const mesTentatives = (tentatives || []).filter(t => t.eleve_id === eleve_id);
          const nbTentatives = mesTentatives.length;
          const totalScore = mesTentatives.reduce((s, t) => s + Number(t.score), 0);
          const totalMax = mesTentatives.reduce((s, t) => s + Number(t.score_max), 0);
          const pourcentage = totalMax > 0 ? Math.round((totalScore / totalMax) * 100) : null;
          const leconsTerminees = (progres || []).filter(p => p.eleve_id === eleve_id).length;
          return { prenom: profiles?.prenom || "—", nbTentatives, pourcentage, leconsTerminees };
        });

        conteneur.innerHTML = `
          <table class="tableau">
            <thead><tr><th>Élève</th><th>Exercices faits</th><th>Score moyen</th><th>Leçons terminées</th></tr></thead>
            <tbody>
              ${lignes.map(l => `
                <tr>
                  <td>${echapperHtml(l.prenom)}</td>
                  <td>${l.nbTentatives}</td>
                  <td>${l.pourcentage === null ? "—" : `
                    <div class="flex items-center gap-1">
                      <div class="barre-progres" style="width:80px;"><div class="barre-progres__valeur" style="width:${l.pourcentage}%;"></div></div>
                      ${l.pourcentage}%
                    </div>`}</td>
                  <td>${l.leconsTerminees}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `;
      }
    }
  </script>
</body>
</html>
