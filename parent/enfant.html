<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Progrès de l'enfant — Espace Parent</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="bandeau-hors-ligne" class="bandeau-hors-ligne">Vous êtes hors connexion.</div>
  <div class="app-topbar">
    <div class="app-nav__marque">🎓 Parent</div>
    <div id="app-topbar-liens" class="app-topbar__liens"></div>
  </div>
  <div class="app-layout">
    <nav class="app-nav" id="app-nav"></nav>
    <main class="app-main">
      <div class="entete-page">
        <h1 id="titre" class="mb-0">Progrès</h1>
        <a href="/parent/tableau-de-bord.html" class="bouton bouton-contour">← Mes enfants</a>
      </div>

      <div class="grille" style="margin-bottom: 2rem;">
        <div class="carte"><div class="texte-att">Exercices faits</div><h2 class="mt-0 mb-0" id="stat-tentatives">—</h2></div>
        <div class="carte"><div class="texte-att">Score moyen</div><h2 class="mt-0 mb-0" id="stat-score">—</h2></div>
        <div class="carte"><div class="texte-att">Leçons terminées</div><h2 class="mt-0 mb-0" id="stat-lecons">—</h2></div>
      </div>

      <h2>Résultats par matière</h2>
      <div id="detail-matieres" style="margin-bottom:2rem;"><p class="texte-att">Chargement…</p></div>

      <h2>Derniers exercices</h2>
      <div id="derniers-exercices"><p class="texte-att">Chargement…</p></div>

      <h2 style="margin-top: 2rem;">Absences</h2>
      <div id="liste-absences"><p class="texte-att">Chargement…</p></div>

      <h2 style="margin-top: 2rem;">Contacter l'enseignant(e)</h2>
      <div id="zone-messagerie"><p class="texte-att">Chargement…</p></div>
    </main>
  </div>

  <script type="module">
    import { exigerRole } from "/js/auth.js";
    import { initLayout, echapperHtml, formaterDate, parametreUrl } from "/js/ui.js";
    import { supabase } from "/js/supabase-client.js";
    import { obtenirMatieres } from "/js/reference-data.js";

    const enfantId = parametreUrl("id");
    const contexte = await exigerRole("parent");
    if (contexte && enfantId) {
      initLayout({ role: "parent", actif: "tableau-de-bord", profile: contexte.profile });

      const { data: enfant } = await supabase.from("profiles").select("prenom").eq("id", enfantId).single();
      document.getElementById("titre").textContent = `Progrès de ${enfant?.prenom || ""}`;

      const { data: tentatives } = await supabase
        .from("tentatives")
        .select("score, score_max, date_fin, exercices(titre, matiere_id)")
        .eq("eleve_id", enfantId)
        .order("date_fin", { ascending: false });
      const { data: progres } = await supabase.from("progres_lecons").select("statut").eq("eleve_id", enfantId);

      const nbTentatives = tentatives?.length || 0;
      const totalScore = (tentatives || []).reduce((s, t) => s + Number(t.score), 0);
      const totalMax = (tentatives || []).reduce((s, t) => s + Number(t.score_max), 0);
      const pourcentage = totalMax > 0 ? Math.round((totalScore / totalMax) * 100) : null;
      const nbLeconsTerminees = (progres || []).filter(p => p.statut === "termine").length;

      document.getElementById("stat-tentatives").textContent = nbTentatives;
      document.getElementById("stat-score").textContent = pourcentage === null ? "—" : `${pourcentage}%`;
      document.getElementById("stat-lecons").textContent = nbLeconsTerminees;

      const matieres = await obtenirMatieres();
      document.getElementById("detail-matieres").innerHTML = matieres.map(m => {
        const mesTentatives = (tentatives || []).filter(t => t.exercices?.matiere_id === m.id);
        const s = mesTentatives.reduce((s, t) => s + Number(t.score), 0);
        const max = mesTentatives.reduce((s, t) => s + Number(t.score_max), 0);
        const pct = max > 0 ? Math.round((s / max) * 100) : 0;
        return `
          <div class="carte" style="margin-bottom:0.75rem;">
            <div class="flex items-center justify-between" style="margin-bottom:0.5rem;">
              <strong>${m.icone} ${echapperHtml(m.nom)}</strong>
              <span class="texte-att">${max > 0 ? `${pct}% — ${mesTentatives.length} exercice(s)` : "Pas encore commencé"}</span>
            </div>
            <div class="barre-progres"><div class="barre-progres__valeur" style="width:${pct}%;"></div></div>
          </div>
        `;
      }).join("");

      const conteneurRecents = document.getElementById("derniers-exercices");
      const recents = (tentatives || []).slice(0, 10);
      conteneurRecents.innerHTML = recents.length ? `
        <div class="tableau-scroll">
        <table class="tableau">
          <thead><tr><th>Exercice</th><th>Date</th><th>Score</th></tr></thead>
          <tbody>
            ${recents.map(t => `
              <tr>
                <td>${echapperHtml(t.exercices?.titre || "—")}</td>
                <td>${formaterDate(t.date_fin)}</td>
                <td>${t.score} / ${t.score_max}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
        </div>
      ` : `<div class="vide">Aucun exercice fait pour l'instant.</div>`;

      const { data: absences } = await supabase
        .from("absences").select("date_absence, motif").eq("eleve_id", enfantId).order("date_absence", { ascending: false });
      const conteneurAbsences = document.getElementById("liste-absences");
      conteneurAbsences.innerHTML = (absences && absences.length) ? `
        <div class="tableau-scroll">
        <table class="tableau">
          <thead><tr><th>Date</th><th>Motif</th></tr></thead>
          <tbody>
            ${absences.map(a => `<tr><td>${formaterDate(a.date_absence)}</td><td>${echapperHtml(a.motif || "—")}</td></tr>`).join("")}
          </tbody>
        </table>
        </div>
      ` : `<div class="vide">Aucune absence enregistrée.</div>`;

      // ---- Messagerie avec le(s) enseignant(s) de l'enfant ----
      const { data: classesEnfant } = await supabase
        .from("classe_eleves").select("classes(id, nom, enseignant_id, profiles(prenom, nom))").eq("eleve_id", enfantId);
      const enseignants = [...new Map(
        (classesEnfant || [])
          .filter(c => c.classes?.enseignant_id)
          .map(c => [c.classes.enseignant_id, { id: c.classes.enseignant_id, prenom: c.classes.profiles?.prenom, classeNom: c.classes.nom }])
      ).values()];

      const zoneMessagerie = document.getElementById("zone-messagerie");
      if (enseignants.length === 0) {
        zoneMessagerie.innerHTML = `<div class="vide">Aucun enseignant identifié pour l'instant.</div>`;
      } else {
        zoneMessagerie.innerHTML = enseignants.map((ens, idx) => `
          <div class="carte" style="margin-bottom:1rem;">
            <h3 class="mt-0">${echapperHtml(ens.prenom || "Enseignant(e)")} — ${echapperHtml(ens.classeNom)}</h3>
            <div id="fil-messages-${idx}" style="margin-bottom:0.75rem;"></div>
            <div id="alerte-message-${idx}"></div>
            <form class="form-message" data-enseignant-id="${ens.id}" style="display:flex; gap:0.5rem;">
              <input type="text" placeholder="Écrire un message…" required style="flex:1; padding:0.6rem 0.8rem; border-radius:8px; border:1.5px solid var(--couleur-bordure);" />
              <button type="submit" class="bouton bouton-primaire">Envoyer</button>
            </form>
          </div>
        `).join("");

        for (let idx = 0; idx < enseignants.length; idx++) {
          const ens = enseignants[idx];
          const { data: msgs } = await supabase
            .from("messages").select("expediteur_id, contenu, created_at")
            .eq("eleve_id", enfantId)
            .or(`and(expediteur_id.eq.${contexte.user.id},destinataire_id.eq.${ens.id}),and(expediteur_id.eq.${ens.id},destinataire_id.eq.${contexte.user.id})`)
            .order("created_at");
          const fil = document.getElementById(`fil-messages-${idx}`);
          fil.innerHTML = (msgs && msgs.length)
            ? msgs.map(m => `
                <p style="margin:0 0 0.4rem;"><strong>${m.expediteur_id === contexte.user.id ? "Vous" : echapperHtml(ens.prenom || "Enseignant(e)")}</strong>
                <span class="texte-att">(${formaterDate(m.created_at)})</span> — ${echapperHtml(m.contenu)}</p>
              `).join("")
            : `<p class="texte-att">Aucun message pour l'instant.</p>`;
        }

        document.querySelectorAll(".form-message").forEach((form, idx) => {
          form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const input = form.querySelector("input");
            const bouton = form.querySelector("button");
            const contenu = input.value.trim();
            if (!contenu) return;
            bouton.disabled = true;
            const { error } = await supabase.from("messages").insert({
              expediteur_id: contexte.user.id,
              destinataire_id: form.dataset.enseignantId,
              eleve_id: enfantId,
              contenu,
            });
            bouton.disabled = false;
            if (error) {
              document.getElementById(`alerte-message-${idx}`).innerHTML = `<div class="alerte alerte-erreur">${error.message}</div>`;
              return;
            }
            input.value = "";
            window.location.reload();
          });
        });
      }
    }
  </script>
</body>
</html>
