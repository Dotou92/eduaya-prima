<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Utilisation numérique — Espace Numérique communal</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="bandeau-hors-ligne" class="bandeau-hors-ligne">Vous êtes hors connexion.</div>
  <div class="app-topbar">
    <div class="app-nav__marque">🎓 Numérique</div>
    <div id="app-topbar-liens" class="app-topbar__liens"></div>
  </div>
  <div class="app-layout">
    <nav class="app-nav" id="app-nav"></nav>
    <main class="app-main">
      <div class="entete-page">
        <h1 id="titre-bienvenue" class="mb-0">Bonjour 👋</h1>
        <p class="texte-att mt-0" id="nom-commune"></p>
      </div>
      <p class="texte-att">Vue orientée usage de la plateforme (nombre de comptes, volume d'activité) — pour le suivi pédagogique détaillé, voir l'espace Éducation communale.</p>
      <div id="liste-ecoles" class="grille"><p class="texte-att">Chargement…</p></div>
    </main>
  </div>

  <script type="module">
    import { exigerRole } from "/js/auth.js";
    import { initLayout, echapperHtml, formaterDate } from "/js/ui.js";
    import { supabase } from "/js/supabase-client.js";

    const contexte = await exigerRole("agent_numerique");
    if (contexte) {
      initLayout({ role: "agent_numerique", actif: "tableau-de-bord", profile: contexte.profile });
      document.getElementById("titre-bienvenue").textContent = `Bonjour ${contexte.profile.prenom} 👋`;

      const communeId = contexte.profile.commune_id;
      const { data: commune } = await supabase.from("communes").select("nom").eq("id", communeId).single();
      document.getElementById("nom-commune").textContent = commune?.nom || "";

      const { data: ecoles, error } = await supabase.from("ecoles").select("id, nom").eq("commune_id", communeId).order("nom");
      const liste = document.getElementById("liste-ecoles");
      if (error) { liste.innerHTML = `<div class="alerte alerte-erreur">${error.message}</div>`; return; }
      if (!ecoles || ecoles.length === 0) {
        liste.innerHTML = `<div class="vide">Aucune école dans cette commune pour l'instant.</div>`;
        return;
      }

      const ecoleIds = ecoles.map(e => e.id);
      const { data: classes } = await supabase.from("classes").select("id, ecole_id, enseignant_id").in("ecole_id", ecoleIds);
      const classeIds = (classes || []).map(c => c.id);
      const { data: inscriptions } = classeIds.length
        ? await supabase.from("classe_eleves").select("classe_id, eleve_id").in("classe_id", classeIds)
        : { data: [] };
      const eleveIds = [...new Set((inscriptions || []).map(i => i.eleve_id))];
      const { data: tentatives } = eleveIds.length
        ? await supabase.from("tentatives").select("eleve_id, date_fin").in("eleve_id", eleveIds)
        : { data: [] };

      const il30Jours = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000);

      liste.innerHTML = ecoles.map(e => {
        const classesDeLEcole = (classes || []).filter(c => c.ecole_id === e.id);
        const classeIdsEcole = classesDeLEcole.map(c => c.id);
        const nbEnseignants = new Set(classesDeLEcole.map(c => c.enseignant_id)).size;
        const elevesDeLEcole = [...new Set((inscriptions || []).filter(i => classeIdsEcole.includes(i.classe_id)).map(i => i.eleve_id))];
        const tentativesEcole = (tentatives || []).filter(t => elevesDeLEcole.includes(t.eleve_id));
        const tentatives30j = tentativesEcole.filter(t => new Date(t.date_fin) >= il30Jours);
        const derniereActivite = tentativesEcole.reduce((max, t) => !max || new Date(t.date_fin) > new Date(max) ? t.date_fin : max, null);

        return `
          <a class="carte carte-lien" href="/numerique/ecole.html?id=${e.id}">
            <h3 class="mb-0">${echapperHtml(e.nom)}</h3>
            <p class="texte-att mb-0">${classesDeLEcole.length} classe(s) · ${nbEnseignants} enseignant(s) · ${elevesDeLEcole.length} élève(s)</p>
            <p class="texte-att mb-0">${tentatives30j.length} activité(s) sur 30 jours</p>
            <p class="texte-att mb-0">Dernière activité : ${derniereActivite ? formaterDate(derniereActivite) : "aucune"}</p>
          </a>
        `;
      }).join("");
    }
  </script>
</body>
</html>
