<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Détail école — Super-Admin</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="bandeau-hors-ligne" class="bandeau-hors-ligne">Vous êtes hors connexion.</div>
  <div class="app-topbar">
    <div class="app-nav__marque">🎓 Super-Admin</div>
    <div id="app-topbar-liens" class="app-topbar__liens"></div>
  </div>
  <div class="app-layout">
    <nav class="app-nav" id="app-nav"></nav>
    <main class="app-main">
      <div class="entete-page">
        <h1 id="titre-ecole" class="mb-0">École</h1>
        <button class="bouton bouton-accent" id="bouton-directeur">+ Créer un compte directeur</button>
      </div>

      <div class="carte" id="carte-directeur" style="display:none; margin-bottom: 1.5rem;">
        <h3 class="mt-0">Créer un compte Directeur</h3>
        <div id="alerte-directeur"></div>
        <form id="form-directeur" class="formulaire" style="max-width:none;">
          <div class="champ"><label for="dir-prenom">Prénom</label><input type="text" id="dir-prenom" required /></div>
          <div class="champ"><label for="dir-nom">Nom</label><input type="text" id="dir-nom" required /></div>
          <div class="champ"><label for="dir-email">Adresse e-mail</label><input type="email" id="dir-email" required /></div>
          <button type="submit" class="bouton bouton-accent" id="bouton-creer-directeur">Créer le compte</button>
        </form>
      </div>

      <div class="carte" id="carte-identifiants-directeur" style="display:none; margin-bottom: 1.5rem;">
        <h3 class="mt-0">🪪 Identifiants à transmettre au directeur</h3>
        <p>Notez ces informations avant de fermer — le mot de passe ne sera plus jamais affiché.</p>
        <table class="tableau">
          <tr><th>Email</th><td id="dir-identifiant-email"></td></tr>
          <tr><th>Mot de passe temporaire</th><td id="dir-identifiant-mdp"></td></tr>
        </table>
      </div>

      <div class="entete-page">
        <h2 class="mb-0">Classes rattachées</h2>
        <button class="bouton bouton-contour" id="bouton-export" style="display:none;">⬇ Exporter en CSV</button>
      </div>
      <div id="graphique-comparaison" class="carte" style="margin-bottom: 1.5rem;"><p class="texte-att">Chargement…</p></div>
      <div id="tableau-classes"><p class="texte-att">Chargement…</p></div>
    </main>
  </div>

  <script type="module">
    import { exigerRole } from "/js/auth.js";
    import { initLayout, echapperHtml, parametreUrl, afficherToast, genererCode, exporterCSV } from "/js/ui.js";
    import { supabase, creerClientJetable } from "/js/supabase-client.js";
    import { graphiqueBarres } from "/js/charts.js";

    const ecoleId = parametreUrl("id");
    const contexte = await exigerRole("super_admin");
    if (contexte && ecoleId) {
      initLayout({ role: "super_admin", actif: "communes", profile: contexte.profile });

      const { data: ecole } = await supabase.from("ecoles").select("nom").eq("id", ecoleId).single();
      document.getElementById("titre-ecole").textContent = ecole?.nom || "École";

      const carteDirecteur = document.getElementById("carte-directeur");
      document.getElementById("bouton-directeur").addEventListener("click", () => {
        carteDirecteur.style.display = carteDirecteur.style.display === "none" ? "block" : "none";
      });

      document.getElementById("form-directeur").addEventListener("submit", async (e) => {
        e.preventDefault();
        const bouton = document.getElementById("bouton-creer-directeur");
        bouton.disabled = true;
        document.getElementById("alerte-directeur").innerHTML = "";

        const prenom = document.getElementById("dir-prenom").value.trim();
        const nom = document.getElementById("dir-nom").value.trim();
        const email = document.getElementById("dir-email").value.trim();
        const motDePasse = genererCode(10);

        const clientJetable = creerClientJetable();
        const { data, error } = await clientJetable.auth.signUp({
          email, password: motDePasse,
          options: { data: { role: "directeur", prenom, nom, ecole_id: ecoleId } },
        });

        bouton.disabled = false;
        if (error || !data.user) {
          document.getElementById("alerte-directeur").innerHTML =
            `<div class="alerte alerte-erreur">${error?.message || "Échec de la création du compte."}</div>`;
          return;
        }

        document.getElementById("form-directeur").reset();
        document.getElementById("dir-identifiant-email").textContent = email;
        document.getElementById("dir-identifiant-mdp").textContent = motDePasse;
        document.getElementById("carte-identifiants-directeur").style.display = "block";
        afficherToast("Compte directeur créé !", "succes");
      });

      async function chargerClasses() {
        const conteneur = document.getElementById("tableau-classes");
        const { data: classes, error } = await supabase
          .from("classes").select("id, nom, niveaux(code)").eq("ecole_id", ecoleId).order("nom");
        const conteneurGraphique = document.getElementById("graphique-comparaison");
        if (error) { conteneur.innerHTML = `<div class="alerte alerte-erreur">${error.message}</div>`; conteneurGraphique.style.display = "none"; return; }
        if (!classes || classes.length === 0) {
          conteneur.innerHTML = `<div class="vide">Aucune classe rattachée à cette école pour l'instant.</div>`;
          conteneurGraphique.style.display = "none";
          return;
        }

        const classeIds = classes.map(c => c.id);
        const { data: inscriptions } = await supabase.from("classe_eleves").select("classe_id, eleve_id").in("classe_id", classeIds);
        const eleveIds = [...new Set((inscriptions || []).map(i => i.eleve_id))];
        const { data: tentatives } = eleveIds.length
          ? await supabase.from("tentatives").select("eleve_id, score, score_max").in("eleve_id", eleveIds)
          : { data: [] };

        const lignes = classes.map(c => {
          const elevesDeClasse = (inscriptions || []).filter(i => i.classe_id === c.id).map(i => i.eleve_id);
          const mesTentatives = (tentatives || []).filter(t => elevesDeClasse.includes(t.eleve_id));
          const totalScore = mesTentatives.reduce((s, t) => s + Number(t.score), 0);
          const totalMax = mesTentatives.reduce((s, t) => s + Number(t.score_max), 0);
          const pct = totalMax > 0 ? Math.round((totalScore / totalMax) * 100) : null;
          return { classe: c, nbEleves: elevesDeClasse.length, pct };
        });

        conteneurGraphique.innerHTML = `<h3 class="mt-0">Comparaison des classes</h3><div id="graphique-inner"></div>`;
        graphiqueBarres(document.getElementById("graphique-inner"), lignes.map(l => ({ label: l.classe.nom, valeur: l.pct })));

        const boutonExport = document.getElementById("bouton-export");
        boutonExport.style.display = "inline-flex";
        boutonExport.onclick = () => exporterCSV(
          "classes-ecole",
          ["Classe", "Niveau", "Élèves", "Score moyen (%)"],
          lignes.map(l => [l.classe.nom, l.classe.niveaux?.code || "", l.nbEleves, l.pct ?? ""])
        );

        conteneur.innerHTML = `
          <div class="tableau-scroll">
          <table class="tableau">
            <thead><tr><th>Classe</th><th>Niveau</th><th>Élèves</th><th>Score moyen</th></tr></thead>
            <tbody>
              ${lignes.map(l => `
                <tr>
                  <td>${echapperHtml(l.classe.nom)}</td>
                  <td>${l.classe.niveaux?.code || ""}</td>
                  <td>${l.nbEleves}</td>
                  <td>${l.pct === null ? "—" : `${l.pct}%`}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
          </div>
        `;
      }

      chargerClasses();
    }
  </script>
</body>
</html>
