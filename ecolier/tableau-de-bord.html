<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mon espace — Écolier</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="bandeau-hors-ligne" class="bandeau-hors-ligne">Vous êtes hors connexion — les leçons téléchargées restent disponibles.</div>
  <div class="app-topbar">
    <div class="app-nav__marque">🎓 Écolier</div>
    <div id="app-topbar-liens" class="app-topbar__liens"></div>
  </div>
  <div class="app-layout">
    <nav class="app-nav" id="app-nav"></nav>
    <main class="app-main">
      <h1 id="titre-bienvenue">Bonjour 👋</h1>
      <p class="texte-att" id="sous-titre"></p>

      <h2>Mes matières</h2>
      <div id="liste-matieres" class="grille" style="margin-bottom: 2rem;"><p class="texte-att">Chargement…</p></div>

      <h2>Devoirs à faire</h2>
      <div id="liste-devoirs"><p class="texte-att">Chargement…</p></div>
    </main>
  </div>

  <script type="module">
    import { exigerRole } from "/js/auth.js";
    import { initLayout, echapperHtml, formaterDate } from "/js/ui.js";
    import { supabase } from "/js/supabase-client.js";
    import { obtenirMatieres } from "/js/reference-data.js";

    const contexte = await exigerRole("ecolier");
    if (contexte) {
      initLayout({ role: "ecolier", actif: "tableau-de-bord", profile: contexte.profile });
      document.getElementById("titre-bienvenue").textContent = `Bonjour ${contexte.profile.prenom} 👋`;

      const { data: niveau } = await supabase.from("niveaux").select("code, nom").eq("id", contexte.profile.niveau_id).single();
      document.getElementById("sous-titre").textContent = niveau ? `${niveau.code} — ${niveau.nom}` : "";

      const matieres = await obtenirMatieres();
      document.getElementById("liste-matieres").innerHTML = matieres.map(m => `
        <a class="carte carte-lien texte-centre" href="/ecolier/matiere.html?matiere=${m.id}" style="padding: 2rem 1rem;">
          <div style="font-size: 2.5rem;">${m.icone}</div>
          <h3>${echapperHtml(m.nom)}</h3>
        </a>
      `).join("");

      const { data: inscriptions } = await supabase.from("classe_eleves").select("classe_id").eq("eleve_id", contexte.user.id);
      const classeIds = (inscriptions || []).map(i => i.classe_id);
      const conteneurDevoirs = document.getElementById("liste-devoirs");
      if (classeIds.length === 0) {
        conteneurDevoirs.innerHTML = `<div class="vide">Aucun devoir pour l'instant.</div>`;
      } else {
        const { data: devoirs } = await supabase
          .from("devoirs").select("id, titre, date_limite").in("classe_id", classeIds)
          .order("created_at", { ascending: false });
        conteneurDevoirs.innerHTML = (devoirs && devoirs.length)
          ? devoirs.map(d => `
              <a class="carte carte-lien flex items-center justify-between" style="margin-bottom:0.75rem;" href="/ecolier/devoir.html?id=${d.id}">
                <strong>${echapperHtml(d.titre)}</strong>
                ${d.date_limite ? `<span class="pastille pastille-jaune">Avant le ${formaterDate(d.date_limite)}</span>` : ""}
              </a>
            `).join("")
          : `<div class="vide">Aucun devoir pour l'instant.</div>`;
      }
    }
  </script>
</body>
</html>
