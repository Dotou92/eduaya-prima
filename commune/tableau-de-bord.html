<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Écoles de la commune — Espace Commune</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="bandeau-hors-ligne" class="bandeau-hors-ligne">Vous êtes hors connexion.</div>
  <div class="app-topbar">
    <div class="app-nav__marque">🎓 Commune</div>
    <div id="app-topbar-liens" class="app-topbar__liens"></div>
  </div>
  <div class="app-layout">
    <nav class="app-nav" id="app-nav"></nav>
    <main class="app-main">
      <div class="entete-page">
        <h1 id="titre-bienvenue" class="mb-0">Bonjour 👋</h1>
        <p class="texte-att mt-0" id="nom-commune"></p>
      </div>
      <div id="liste-ecoles" class="grille"><p class="texte-att">Chargement…</p></div>
    </main>
  </div>

  <script type="module">
    import { exigerRole } from "/js/auth.js";
    import { initLayout, echapperHtml } from "/js/ui.js";
    import { supabase } from "/js/supabase-client.js";

    function avecDelai(promesse, ms, etiquette) {
      return Promise.race([
        promesse,
        new Promise((_, reject) => setTimeout(() => reject(new Error(`Délai dépassé (${etiquette}) — la requête n'a jamais répondu.`)), ms)),
      ]);
    }

    let contexte;
    try {
      contexte = await avecDelai(exigerRole("agent_commune"), 8000, "vérification du compte");
    } catch (e) {
      document.getElementById("liste-ecoles").innerHTML = `<div class="alerte alerte-erreur">${e.message}</div>`;
      contexte = null;
    }

    if (contexte) {
      initLayout({ role: "agent_commune", actif: "tableau-de-bord", profile: contexte.profile });
      document.getElementById("titre-bienvenue").textContent = `Bonjour ${contexte.profile.prenom} 👋`;

      const liste = document.getElementById("liste-ecoles");
      try {
        const communeId = contexte.profile.commune_id;
        if (!communeId) {
          liste.innerHTML = `<div class="alerte alerte-erreur">Ce compte agent communal n'a pas de commune associée (commune_id manquant sur le profil). Il faut recréer le compte depuis Super-Admin en choisissant bien une commune.</div>`;
          return;
        }

        const { data: commune, error: erreurCommune } = await avecDelai(
          supabase.from("communes").select("nom").eq("id", communeId).single(), 8000, "chargement de la commune"
        );
        if (erreurCommune) console.error("Erreur chargement commune :", erreurCommune);
        document.getElementById("nom-commune").textContent = commune?.nom || "";

        const { data: ecoles, error } = await avecDelai(
          supabase.from("ecoles").select("id, nom").eq("commune_id", communeId).order("nom"), 8000, "chargement des écoles"
        );
        if (error) { liste.innerHTML = `<div class="alerte alerte-erreur">${error.message}</div>`; return; }
        if (!ecoles || ecoles.length === 0) {
          liste.innerHTML = `<div class="vide">Aucune école dans cette commune pour l'instant.</div>`;
          return;
        }

        const ecoleIds = ecoles.map(e => e.id);
        const { data: classes } = await supabase.from("classes").select("id, ecole_id").in("ecole_id", ecoleIds);
        const classeIds = (classes || []).map(c => c.id);
        const { data: inscriptions } = classeIds.length
          ? await supabase.from("classe_eleves").select("classe_id, eleve_id").in("classe_id", classeIds)
          : { data: [] };
        const eleveIds = [...new Set((inscriptions || []).map(i => i.eleve_id))];
        const { data: tentatives } = eleveIds.length
          ? await supabase.from("tentatives").select("eleve_id, score, score_max").in("eleve_id", eleveIds)
          : { data: [] };

        liste.innerHTML = ecoles.map(e => {
          const classesDeLEcole = (classes || []).filter(c => c.ecole_id === e.id).map(c => c.id);
          const elevesDeLEcole = (inscriptions || []).filter(i => classesDeLEcole.includes(i.classe_id)).map(i => i.eleve_id);
          const idsUniques = [...new Set(elevesDeLEcole)];
          const mesTentatives = (tentatives || []).filter(t => idsUniques.includes(t.eleve_id));
          const totalScore = mesTentatives.reduce((s, t) => s + Number(t.score), 0);
          const totalMax = mesTentatives.reduce((s, t) => s + Number(t.score_max), 0);
          const pct = totalMax > 0 ? Math.round((totalScore / totalMax) * 100) : null;
          return `
            <a class="carte carte-lien" href="/commune/ecole.html?id=${e.id}">
              <h3 class="mb-0">${echapperHtml(e.nom)}</h3>
              <p class="mb-0 texte-att">${idsUniques.length} élève(s) — ${pct === null ? "pas encore de résultats" : `${pct}% de réussite`}</p>
            </a>
          `;
        }).join("");
      } catch (e) {
        console.error("Erreur inattendue :", e);
        liste.innerHTML = `<div class="alerte alerte-erreur">Erreur inattendue : ${e.message}</div>`;
      }
    }
  </script>
</body>
</html>
