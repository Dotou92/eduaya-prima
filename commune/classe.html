<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Classe — Espace Commune</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="bandeau-hors-ligne" class="bandeau-hors-ligne">Vous êtes hors connexion.</div>
  <div class="app-topbar">
    <div class="app-nav__marque">🎓 Commune</div>
    <div id="app-topbar-liens" class="app-topbar__liens"></div>
  </div>
  <div class="app-layout">
    <nav class="app-nav" id="app-nav"></nav>
    <main class="app-main">
      <div class="entete-page">
        <h1 id="titre-classe" class="mb-0">Classe</h1>
        <a id="lien-retour" class="bouton bouton-contour" href="/commune/tableau-de-bord.html">← Retour</a>
      </div>
      <h2>Élèves</h2>
      <div id="liste-eleves"><p class="texte-att">Chargement…</p></div>
    </main>
  </div>

  <script type="module">
    import { exigerRole } from "/js/auth.js";
    import { initLayout, echapperHtml, parametreUrl } from "/js/ui.js";
    import { supabase } from "/js/supabase-client.js";

    const classeId = parametreUrl("id");
    const contexte = await exigerRole("agent_commune");
    if (contexte && classeId) {
      initLayout({ role: "agent_commune", actif: "tableau-de-bord", profile: contexte.profile });

      const { data: classe } = await supabase.from("classes").select("nom, ecole_id").eq("id", classeId).single();
      document.getElementById("titre-classe").textContent = classe?.nom || "Classe";
      if (classe?.ecole_id) {
        document.getElementById("lien-retour").href = `/commune/ecole.html?id=${classe.ecole_id}`;
      }

      const { data: inscriptions, error } = await supabase
        .from("classe_eleves").select("eleve_id, profiles(prenom, nom)").eq("classe_id", classeId);

      const conteneur = document.getElementById("liste-eleves");
      if (error) { conteneur.innerHTML = `<div class="alerte alerte-erreur">${error.message}</div>`; return; }
      if (!inscriptions || inscriptions.length === 0) {
        conteneur.innerHTML = `<div class="vide">Aucun élève dans cette classe.</div>`;
        return;
      }

      const eleveIds = inscriptions.map(i => i.eleve_id);
      const { data: tentatives } = await supabase.from("tentatives").select("eleve_id, score, score_max").in("eleve_id", eleveIds);

      conteneur.innerHTML = `
        <table class="tableau">
          <thead><tr><th>Prénom</th><th>Exercices faits</th><th>Score moyen</th></tr></thead>
          <tbody>
            ${inscriptions.map(i => {
              const mesTentatives = (tentatives || []).filter(t => t.eleve_id === i.eleve_id);
              const totalScore = mesTentatives.reduce((s, t) => s + Number(t.score), 0);
              const totalMax = mesTentatives.reduce((s, t) => s + Number(t.score_max), 0);
              const pct = totalMax > 0 ? Math.round((totalScore / totalMax) * 100) : null;
              return `
                <tr>
                  <td>${echapperHtml(i.profiles?.prenom || "—")}</td>
                  <td>${mesTentatives.length}</td>
                  <td>${pct === null ? "—" : `${pct}%`}</td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      `;
    }
  </script>
</body>
</html>
