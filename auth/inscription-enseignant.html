<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inscription enseignant — EduAya Prima</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <main class="conteneur-etroit" style="padding: 3rem 0;">
    <div class="texte-centre" style="margin-bottom: 1.5rem;">
      <a href="/" style="text-decoration: none; color: inherit; font-weight: 800; font-size: 1.2rem;">🎓 EduAya Prima</a>
    </div>

    <div class="carte">
      <h2>Créer un compte enseignant</h2>
      <div id="alerte-zone"></div>
      <form id="form-inscription" class="formulaire" style="max-width:none;">
        <div class="champ">
          <label for="prenom">Prénom</label>
          <input type="text" id="prenom" required />
        </div>
        <div class="champ">
          <label for="nom">Nom</label>
          <input type="text" id="nom" required />
        </div>
        <div class="champ">
          <label for="email">Adresse e-mail</label>
          <input type="email" id="email" required autocomplete="email" />
        </div>
        <div class="champ">
          <label for="mot-de-passe">Mot de passe</label>
          <input type="password" id="mot-de-passe" required minlength="6" autocomplete="new-password" />
          <small>6 caractères minimum.</small>
        </div>
        <button type="submit" class="bouton bouton-primaire bouton-bloc bouton-grand" id="bouton-envoyer">Créer mon compte</button>
      </form>

      <div class="flex items-center gap-1" style="margin: 1.25rem 0; color: var(--couleur-texte-att); font-size: 0.85rem;">
        <div style="flex:1; height:1px; background:var(--couleur-bordure);"></div>
        ou
        <div style="flex:1; height:1px; background:var(--couleur-bordure);"></div>
      </div>
      <button type="button" class="bouton bouton-contour bouton-bloc" id="bouton-google">🔵 Continuer avec Google</button>

      <p class="texte-centre texte-att" style="margin-top: 1.25rem;">
        Déjà inscrit(e) ? <a href="/auth/login.html">Se connecter</a>
      </p>
    </div>
  </main>

  <script type="module">
    import { supabase } from "/js/supabase-client.js";

    const form = document.getElementById("form-inscription");
    const alerteZone = document.getElementById("alerte-zone");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const bouton = document.getElementById("bouton-envoyer");
      bouton.disabled = true;
      alerteZone.innerHTML = "";

      const prenom = document.getElementById("prenom").value.trim();
      const nom = document.getElementById("nom").value.trim();
      const email = document.getElementById("email").value.trim();
      const motDePasse = document.getElementById("mot-de-passe").value;

      const { data, error } = await supabase.auth.signUp({
        email,
        password: motDePasse,
        options: { data: { role: "enseignant", prenom, nom } },
      });

      bouton.disabled = false;

      if (error) {
        alerteZone.innerHTML = `<div class="alerte alerte-erreur">${error.message}</div>`;
        return;
      }

      if (!data.session) {
        alerteZone.innerHTML = `<div class="alerte alerte-info">Compte créé. Vérifiez votre boîte mail pour confirmer votre adresse, puis connectez-vous.</div>`;
        return;
      }

      window.location.href = "/enseignant/tableau-de-bord.html";
    });

    document.getElementById("bouton-google").addEventListener("click", async () => {
      await supabase.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo: `${window.location.origin}/auth/oauth-callback.html?role=enseignant` },
      });
    });
  </script>
</body>
</html>
